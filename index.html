<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #20b2aa; } /* Biru Tosca */
    </style>
</head>
<body class="flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-xl w-96">
        <img src="https://wahdah.or.id/wp-content/uploads/2023/06/Logo-MWW.png" class="w-20 mx-auto mb-4">
        <h1 class="text-center font-bold text-teal-600 mb-6">DPW MUSLIMAH WAHDAH WILAYAH SULAWESI TENGAH</h1>
        
        <input type="text" id="user" placeholder="Username" class="w-full p-2 mb-4 border rounded">
        
        <div class="relative mb-6">
            <input type="password" id="pass" placeholder="Password" class="w-full p-2 border rounded">
            <button type="button" onclick="togglePass()" class="absolute right-3 top-2 text-gray-500">👁️</button>
        </div>
        
        <button onclick="login()" class="w-full bg-teal-500 text-white py-2 rounded hover:bg-teal-600">Masuk</button>
    </div>

    <script>
        function togglePass() {
            const p = document.getElementById('pass');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            // Gunakan google.script.run untuk memanggil fungsi di Apps Script
            google.script.run.withSuccessHandler(res => {
                if(res) alert("Berhasil Login!");
                else alert("Username/Password Salah");
            }).verifyLogin(u, p);
        }
    </script>
</body>
</html>
