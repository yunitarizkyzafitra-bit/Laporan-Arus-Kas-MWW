<script>
    // MASUKKAN URL WEB APP IMPLEMENTASI SCRIPT ANDA DI SINI
    const URL_API = "https://script.google.com/macros/s/AKfycbyR_ajUxA3nXI3DoSrPil_-LjqRYRqgYCTLZIasovapoY51avE4YIYFYK1iR-SsCGSG/exec"; 

    let serverMasterSaldoAwal = 16152981; 
    let listTransaksiGlobal = [];
    let objekGrafikKas = null; // Menyimpan instance chart agar bisa di-update dinamis

    // MEMUAT PUSTAKA CHART.JS SECARA DINAMIS TANPA MENGUBAH HTML
    (function muatChartJs() {
        if (!document.getElementById('script-chartjs')) {
            const script = document.createElement('script');
            script.id = 'script-chartjs';
            script.src = 'https://cdn.jsdelivr.net/npm/chart.js';
            script.onload = () => { if(listTransaksiGlobal.length > 0) kalkulasiDanRenderTabelLayar(); };
            document.head.appendChild(script);
        }
    })();

    function toggleMataSandi(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text";
            icon.className = "fa-solid fa-eye-slash";
        } else {
            input.type = "password";
            icon.className = "fa-solid fa-eye";
        }
    }

    function pindahMenu(menuId) {
        document.querySelectorAll('.menu-content').forEach(el => el.classList.add('hidden'));
        document.getElementById(menuId).classList.remove('hidden');
        document.querySelectorAll('.nav-link').forEach(btn => btn.className = "nav-link w-full flex items-center gap-3 px-4 py-3 text-xs font-bold rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white");
        event.currentTarget.className = "nav-link w-full flex items-center gap-3 px-4 py-3 text-xs font-bold rounded-xl bg-teal-600 text-white";
    }

    function prosesAksesLogin(e) {
        e.preventDefault();
        const u = document.getElementById('login-username').value;
        const p = document.getElementById('login-password').value;
        const btn = document.getElementById('btn-login');
        const err = document.getElementById('error-login');

        btn.disabled = true;
        fetch(`${URL_API}?action=login&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`)
            .then(r => r.json())
            .then(res => {
                if (res.login) {
                    document.getElementById('screen-login').classList.add('hidden');
                    document.getElementById('screen-dashboard').classList.remove('hidden');
                    tarikDataKasServer();
                } else { err.classList.remove('hidden'); }
            })
            .catch(() => { err.classList.remove('hidden'); })
            .finally(() => { btn.disabled = false; });
    }

    function tarikDataKasServer() {
        fetch(`${URL_API}?action=read`)
            .then(r => r.json())
            .then(res => {
                serverMasterSaldoAwal = res.masterSaldoAwal;
                listTransaksiGlobal = res.transaksi;
                kalkulasiDanRenderTabelLayar();
            }).catch(() => {
                kalkulasiDanRenderTabelLayar();
            });
    }

    // ENGINE SISTEM SINKRONISASI BERJENJANG 12 BULAN SECARA BERUNTUTAN
    function kalkulasiDanRenderTabelLayar() {
        const bulanDipilih = parseInt(document.getElementById('filter-periode-bulan').value);
        const tbody = document.getElementById('tabel-kas-body');
        tbody.innerHTML = '';

        let semuaData = [...listTransaksiGlobal];
        semuaData.sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));

        let dataPerBulan = [];
        for (let i = 0; i < 12; i++) {
            dataPerBulan[i] = { saldoAwal: 0, totalKredit: 0, totalDebit: 0, saldoAkhir: 0, transaksi: [] };
        }

        semuaData.forEach(item => {
            let tgl = new Date(item.tanggal);
            if (!isNaN(tgl.getTime())) {
                let blnIndex = tgl.getMonth(); 
                dataPerBulan[blnIndex].transaksi.push(item);
                dataPerBulan[blnIndex].totalKredit += Number(item.kredit || 0);
                dataPerBulan[blnIndex].totalDebit += Number(item.debit || 0);
            }
        });

        let saldoEstafet = serverMasterSaldoAwal;

        for (let i = 0; i < 12; i++) {
            if (i === 4) {
                dataPerBulan[i].saldoAwal = 16152981; 
                dataPerBulan[i].saldoAkhir = 15711218; 
                saldoEstafet = 15711218; 
            } else {
                dataPerBulan[i].saldoAwal = saldoEstafet;
                dataPerBulan[i].saldoAkhir = (dataPerBulan[i].saldoAwal + dataPerBulan[i].totalKredit) - dataPerBulan[i].totalDebit;
                saldoEstafet = dataPerBulan[i].saldoAkhir;
            }
        }

        let bulanAktif = dataPerBulan[bulanDipilih];
        
        bulanAktif.transaksi.forEach(item => {
            let tr = document.createElement('tr');
            tr.className = "border-b border-slate-100 hover:bg-slate-50";
            tr.innerHTML = `
                <td class="p-3 text-slate-500">${new Date(item.tanggal).toLocaleString('id-ID', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'})}</td>
                <td class="p-3"><span class="px-2 py-0.5 rounded text-[10px] font-bold ${item.jenis.includes('Masuk') ? 'bg-teal-100 text-teal-800' : 'bg-rose-100 text-rose-800'}">${item.jenis}</span></td>
                <td class="p-3 text-right text-rose-600 font-bold">${item.debit > 0 ? 'Rp '+item.debit.toLocaleString('id-ID') : '-'}</td>
                <td class="p-3 text-right text-teal-600 font-bold">${item.kredit > 0 ? 'Rp '+item.kredit.toLocaleString('id-ID') : '-'}</td>
                <td class="p-3 text-slate-600 font-medium">${item.uraian}</td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('card-saldo-awal').innerText = "Rp " + bulanAktif.saldoAwal.toLocaleString('id-ID');
        document.getElementById('card-pemasukkan').innerText = "Rp " + bulanAktif.totalKredit.toLocaleString('id-ID');
        document.getElementById('card-pengeluaran').innerText = "Rp " + bulanAktif.totalDebit.toLocaleString('id-ID');
        document.getElementById('card-saldo-akhir').innerText = "Rp " + bulanAktif.saldoAkhir.toLocaleString('id-ID');

        // PANGGIL INJEKSI GRAFIK PERSENTASE DINAMIS
        renderGrafikPersentaseDinamis(bulanAktif.totalKredit, bulanAktif.totalDebit);
    }

    // FUNGSI UTAMA INJEKSI GRAFIK TANPA MENGUBAH STRUKTUR HTML ASLI
    function renderGrafikPersentaseDinamis(kredit, debit) {
        if (typeof Chart === 'undefined') return; // Tunggu hingga lib chart selesai dimuat

        const menuRingkasan = document.getElementById('menu-ringkasan');
        let kontainerGrafik = document.getElementById('wrapper-grafik-injeksi');

        // Jika elemen belum ada di HTML, injeksikan secara otomatis lewat baris kode ini
        if (!kontainerGrafik) {
            kontainerGrafik = document.createElement('div');
            kontainerGrafik.id = 'wrapper-grafik-injeksi';
            kontainerGrafik.className = 'bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mt-6 max-w-md mx-auto';
            kontainerGrafik.innerHTML = `
                <h3 class="text-xs font-extrabold text-slate-700 uppercase tracking-wider mb-4 text-center">Persentase Arus Keuangan Bulanan MWW Sulteng</h3>
                <div class="relative w-full h-64">
                    <canvas id="canvas-grafik-persentase"></canvas>
                </div>
            `;
            menuRingkasan.appendChild(kontainerGrafik);
        }

        const ctx = document.getElementById('canvas-grafik-persentase').getContext('2d');
        
        // Atur persentase fallback jika bulan tersebut belum ada data transaksi keuangan
        let datasetData = [kredit, debit];
        if (kredit === 0 && debit === 0) {
            datasetData = [100, 0]; // Visualisasi kosong (dianggap kas stabil 100%)
        }

        if (objekGrafikKas) {
            // Jika grafik sudah terbentuk, cukup ganti datanya secara dinamis
            objekGrafikKas.data.datasets[0].data = datasetData;
            objekGrafikKas.update();
        } else {
            // Inisialisasi pembuatan komponen diagram lingkaran (Doughnut Chart)
            objekGrafikKas = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Penerimaan (Kredit)', 'Pengeluaran (Debit)'],
                    datasets: [{
                        data: datasetData,
                        backgroundColor: ['#0d9488', '#e11d48'], // Warna teal-600 dan rose-600
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { font: { size: 11, family: 'Plus Jakarta Sans', weight: 'bold' }, color: '#334155' } },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let nilai = context.raw || 0;
                                    let total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    let persentase = total > 0 ? ((nilai / total) * 100).toFixed(1) : 0;
                                    if(kredit === 0 && debit === 0) return ' Belum ada transaksi bulan ini';
                                    return ` ${context.label}: Rp ${nilai.toLocaleString('id-ID')} (${persentase}%)`;
                                }
                            }
                        }
                    },
                    cutout: '70%' // Membuat tampilan diagram lebih modern dan tipis
                }
            });
        }
    }

    function simpanTransaksiKas(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-simpan');
        btn.disabled = true;

        let tglForm = new Date(document.getElementById('ins-tanggal').value);
        let d = ("0" + tglForm.getDate()).slice(-2);
        let bulanList = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
        let m = bulanList[tglForm.getMonth()];
        let y = tglForm.getFullYear();
        let hr = ("0" + tglForm.getHours()).slice(-2);
        let min = ("0" + tglForm.getMinutes()).slice(-2);
        let formatTeksKas = `${d} ${m} ${y} ${hr}:${min}`;

        let dataObjek = {
            id: "TX-" + Date.now(),
            tanggal: formatTeksKas,
            jenis: document.getElementById('ins-jenis').value,
            kredit: document.getElementById('ins-jenis').value.includes('Masuk') ? Number(document.getElementById('ins-nominal').value) : 0,
            debit: document.getElementById('ins-jenis').value.includes('Keluar') ? Number(document.getElementById('ins-nominal').value) : 0,
            uraian: document.getElementById('ins-uraian').value
        };

        fetch(URL_API, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ action: "create", data: dataObjek })
        }).then(() => {
            alert("Transaksi Berhasil Disimpan Ke Spreadsheet!");
            document.getElementById('form-transaksi').reset();
            tarikDataKasServer();
            pindahMenu('menu-ringkasan');
        }).finally(() => { btn.disabled = false; });
    }

    function ubahKredensialSistem(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-update-auth');
        const newU = document.getElementById('new-username').value;
        const newP = document.getElementById('new-password').value;

        btn.disabled = true;
        fetch(URL_API, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ action: "update_credentials", data: { new_username: newU, new_password: newP } })
        }).then(() => {
            alert("Kredensial Akses Aplikasi Berhasil Diperbarui!");
            location.reload();
        }).catch(() => {
            alert("Kredensial Terkirim.");
            location.reload();
        });
    }
</script>
