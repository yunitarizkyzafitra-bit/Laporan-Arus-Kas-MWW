<div class="bg-white p-8 rounded-lg shadow-xl w-96 border-t-4 border-teal-600">
    <img src="https://wahdah.or.id/wp-content/uploads/2023/06/Logo-MWW.png" class="w-20 mx-auto mb-4">
    <h1 class="text-center font-bold text-teal-800 mb-6">LOGIN SISTEM KAS</h1>
    
    <!-- Username -->
    <div class="mb-4">
        <label class="block text-sm text-teal-700 mb-1">Username</label>
        <input type="text" id="user" value="muslimah" class="w-full p-2 border rounded border-teal-200 focus:ring-2 focus:ring-teal-500 outline-none">
    </div>
    
    <!-- Password dengan Toggle -->
    <div class="mb-6">
        <label class="block text-sm text-teal-700 mb-1">Password</label>
        <div class="relative">
            <input type="password" id="pass" value="bismillah" class="w-full p-2 border rounded border-teal-200 focus:ring-2 focus:ring-teal-500 outline-none">
            <button type="button" onclick="togglePass()" class="absolute right-3 top-2 text-teal-600 font-bold text-xs">👁️</button>
        </div>
    </div>
    
    <button onclick="login()" class="w-full bg-teal-700 text-white py-2 rounded hover:bg-teal-800 transition">Masuk ke Dashboard</button>
</div>

<script>
    function togglePass() {
        const p = document.getElementById('pass');
        p.type = p.type === 'password' ? 'text' : 'password';
    }

    function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        
        // Verifikasi statis sesuai permintaan
        if(u === 'muslimah' && p === 'bismillah') {
            alert("Selamat Datang, Muslimah!");
            // Tambahkan logika untuk redirect ke dashboard di sini
        } else {
            alert("Username atau Password salah.");
        }
    }
</script>
